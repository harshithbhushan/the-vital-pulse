apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-broker
  labels:
    app: redpanda
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: docker.redpanda.com/redpandadata/redpanda:v23.3.10
        args:
        - redpanda
        - start
        - --smp=1
        - --memory=1G
        - --reserve-memory=0M
        - --overprovisioned
        - --node-id=0
        - --check=false
        # THE SPLIT-BRAIN CONFIGURATION
        - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:29092
        - --advertise-kafka-addr=internal://kafka-service:9092,external://localhost:29092
        ports:
        - containerPort: 9092
          name: internal
        - containerPort: 29092
          name: external
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
spec:
  selector:
    app: redpanda
  ports:
  - name: internal
    protocol: TCP
    port: 9092
    targetPort: 9092
  - name: external
    protocol: TCP
    port: 29092
    targetPort: 29092